<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <pattern id="grid-cs" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.06"/>
    </pattern>
    <linearGradient id="bg-cs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a2616"/>
      <stop offset="100%" stop-color="#1a0e08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-cs)"/>
  <rect width="1280" height="720" fill="url(#grid-cs)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1280" height="3" fill="#8B5E3C" opacity="0.7"/>

  <!-- Number -->
  <text x="64" y="96" font-family="sans-serif" font-size="13" font-weight="500" fill="#c9a96e" opacity="0.9" letter-spacing="4">01</text>

  <!-- Project name -->
  <text x="640" y="330" text-anchor="middle" font-family="sans-serif" font-size="86" font-weight="800" fill="#f5f0e8" opacity="0.92" letter-spacing="-2">Casa Santé</text>

  <!-- Category -->
  <text x="640" y="400" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="400" fill="#c9a96e" letter-spacing="8">LANDING PAGE</text>

  <!-- Divider -->
  <line x1="560" y1="432" x2="720" y2="432" stroke="#c9a96e" stroke-width="1" opacity="0.35"/>

  <!-- Replace hint -->
  <text x="640" y="686" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ffffff" opacity="0.18" letter-spacing="2">SUBSTITUIR POR THUMBNAIL REAL · 1280 × 720 px</text>
</svg>
